version: 1
default_gate: ask.domain

providers:
  anthropic:
    type: langchain_anthropic
    model: claude-sonnet-4-20250514
    max_tokens: 4096
    timeout_seconds: 60
  openai:
    type: langchain_openai
    model: gpt-4o
    max_tokens: 4096
    timeout_seconds: 60
  ollama:
    type: langchain_ollama
    model: llama3.1
    base_url: http://localhost:11434
    timeout_seconds: 120

gates:
  ask.domain:
    provider: anthropic
    temperature: 0.2
    review_required: true
