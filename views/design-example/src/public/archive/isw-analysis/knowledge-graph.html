<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MABSTRUCT Knowledge Graph</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0e17;
    color: #c8d6e5;
    overflow: hidden;
    height: 100vh;
  }

  #app {
    display: flex;
    height: 100vh;
    position: relative;
  }

  #graph-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  svg { width: 100%; height: 100%; }

  /* Edge labels */
  .edge-label {
    font-size: 9px;
    fill: #556677;
    pointer-events: none;
    text-anchor: middle;
  }

  /* Links */
  .link {
    stroke-opacity: 0.35;
    stroke-width: 1.2;
  }
  .link.highlighted {
    stroke-opacity: 0.9;
    stroke-width: 2.5;
  }
  .link.dimmed {
    stroke-opacity: 0.07;
  }

  /* Nodes */
  .node circle {
    stroke-width: 2;
    cursor: pointer;
    transition: r 0.2s;
  }
  .node.dimmed circle { opacity: 0.15; }
  .node.dimmed text { opacity: 0.1; }

  .node text {
    font-size: 10px;
    fill: #a0b0c0;
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: central;
  }
  .node.highlighted text {
    fill: #ffffff;
    font-weight: 600;
  }

  /* Arrows */
  marker path { fill: #445566; }

  /* Side panel */
  #panel {
    width: 420px;
    min-width: 300px;
    background: #111827;
    border-left: none;
    overflow-y: auto;
    padding: 0;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
  }
  #panel.collapsed {
    transform: translateX(420px);
    width: 0;
    min-width: 0;
    padding: 0;
    border: none;
  }

  #panel-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid #1e293b;
    position: sticky;
    top: 0;
    background: #111827;
    z-index: 10;
  }

  #panel-header h2 {
    font-size: 18px;
    font-weight: 700;
    color: #f1f5f9;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .card-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-theme { background: #1e3a5f; color: #60a5fa; }
  .badge-provocation { background: #3b1f3b; color: #c084fc; }
  .badge-finding { background: #1a3a2a; color: #4ade80; }
  .badge-gap { background: #3b2f1a; color: #fbbf24; }
  .badge-method { background: #1a2f3b; color: #22d3ee; }
  .badge-weird { background: #3b1a2a; color: #fb7185; }

  .badge-domain { background: #1e293b; color: #94a3b8; }

  .confidence-dots {
    display: inline-flex;
    gap: 3px;
    align-items: center;
    margin-left: 4px;
  }
  .confidence-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #334155;
  }
  .confidence-dot.filled { background: #60a5fa; }

  #panel-body {
    padding: 20px 24px 32px;
    flex: 1;
  }

  #panel-body h3 {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #64748b;
    margin: 20px 0 10px;
  }
  #panel-body h3:first-child { margin-top: 0; }

  #panel-body p, #panel-body li {
    font-size: 13.5px;
    line-height: 1.7;
    color: #b0bec5;
  }

  #panel-body ul {
    padding-left: 16px;
  }
  #panel-body li {
    margin-bottom: 6px;
  }

  .connection-list {
    list-style: none;
    padding: 0;
  }
  .connection-list li {
    padding: 8px 12px;
    margin-bottom: 4px;
    border-radius: 8px;
    background: #1a2332;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .connection-list li:hover {
    background: #243447;
  }
  .conn-type {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .conn-type-supports { background: #1a3a2a; color: #4ade80; }
  .conn-type-contradicts { background: #3b1a1a; color: #f87171; }
  .conn-type-extends { background: #1e3a5f; color: #60a5fa; }
  .conn-type-parallels { background: #2d2a1a; color: #fbbf24; }
  .conn-type-requires { background: #3b1f3b; color: #c084fc; }
  .conn-type-gap-for { background: #3b2f1a; color: #fb923c; }

  .conn-name {
    font-size: 12.5px;
    color: #c8d6e5;
  }
  .conn-direction {
    font-size: 10px;
    color: #64748b;
    margin-left: auto;
    white-space: nowrap;
  }

  .conn-note {
    font-size: 11px;
    color: #7a8a9a;
    font-style: italic;
    padding: 2px 12px 4px 12px;
  }

  /* Empty state */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 40px;
  }
  #empty-state .icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }
  #empty-state p {
    color: #64748b;
    font-size: 14px;
    line-height: 1.6;
  }

  /* Legend */
  #legend {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: rgba(17, 24, 39, 0.9);
    border: 1px solid #1e293b;
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 11px;
    backdrop-filter: blur(8px);
  }
  #legend h4 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #64748b;
    margin-bottom: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    color: #94a3b8;
    cursor: pointer;
    user-select: none;
    padding: 2px 6px;
    margin-left: -6px;
    border-radius: 4px;
    transition: background 0.12s, opacity 0.12s;
  }
  .legend-item:hover {
    background: rgba(255, 255, 255, 0.04);
    color: #cbd5e1;
  }
  .legend-item.filtered-off {
    opacity: 0.35;
    text-decoration: line-through;
  }
  .legend-item.filtered-off .legend-dot {
    background: #333 !important;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    transition: background 0.12s;
  }
  #legend .legend-hint {
    font-size: 10px;
    color: #475569;
    margin-top: 6px;
    font-style: italic;
  }
  .node.type-hidden { display: none; }
  .link.link-hidden { display: none; }
  .edge-label.edge-hidden { display: none; }

  /* Title bar */
  #title-bar {
    position: absolute;
    top: 16px;
    left: 20px;
    z-index: 5;
  }
  /* Hide title bar when embedded in iframe */
  @media all {
    :root[data-embedded] #title-bar { display: none; }
  }
  #title-bar .back-link {
    font-size: 11px;
    color: #06B6D4;
    text-decoration: none;
    opacity: 0.7;
    transition: opacity 0.15s;
  }
  #title-bar .back-link:hover {
    opacity: 1;
  }
  #title-bar h1 {
    font-size: 24px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.5px;
    margin-top: 6px;
    line-height: 1.2;
  }
  #title-bar .subtitle {
    font-size: 13px;
    color: #7a8a9a;
    margin-top: 4px;
    font-weight: 500;
  }

  /* Draggable divider */
  #divider {
    width: 4px;
    background: #1a2332;
    border-left: 1px solid #0f1419;
    border-right: 1px solid #243447;
    cursor: col-resize;
    user-select: none;
    position: relative;
    transition: background 0.15s;
  }
  #divider:hover {
    background: #243447;
  }
  #divider::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 1px;
    height: 30px;
    background: #334155;
    opacity: 0.4;
  }

  /* Controls */
  #controls {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 5;
  }
  #controls.shifted { right: auto; }
  .ctrl-btn {
    background: rgba(17, 24, 39, 0.85);
    border: 1px solid #1e293b;
    color: #94a3b8;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: all 0.15s;
  }
  .ctrl-btn:hover {
    background: #1e293b;
    color: #f1f5f9;
  }
  .ctrl-btn.active {
    background: #1e3a5f;
    border-color: #3b82f6;
    color: #60a5fa;
  }

  /* Tags in panel */
  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 6px;
    background: #1e293b;
    color: #8899aa;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .tag:hover {
    background: #263548;
    color: #c8d6e5;
    border-color: #3b82f6;
  }
  .tag.active {
    background: #1e3a5f;
    color: #60a5fa;
    border-color: #3b82f6;
  }

  /* Paper results in panel */
  .papers-section {
    margin-top: 16px;
    border-top: 1px solid #1e293b;
    padding-top: 16px;
  }
  .papers-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .papers-header h3 {
    margin: 0 !important;
  }
  .papers-close {
    font-size: 11px;
    color: #64748b;
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 4px;
    background: #1a2332;
    border: none;
    transition: all 0.15s;
  }
  .papers-close:hover {
    background: #243447;
    color: #c8d6e5;
  }
  .paper-card {
    padding: 10px 12px;
    margin-bottom: 6px;
    border-radius: 8px;
    background: #1a2332;
    border-left: 3px solid #334155;
    transition: background 0.15s;
  }
  .paper-card:hover {
    background: #1e2d40;
  }
  .paper-card a {
    text-decoration: none;
  }
  .paper-title {
    font-size: 12.5px;
    color: #e2e8f0;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 4px;
  }
  .paper-title:hover {
    color: #60a5fa;
  }
  .paper-meta {
    font-size: 10px;
    color: #64748b;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .paper-cluster {
    padding: 1px 6px;
    border-radius: 4px;
    background: #162030;
    color: #7a8a9a;
  }
  .paper-summary {
    font-size: 11px;
    color: #7a8a9a;
    line-height: 1.5;
    margin-top: 4px;
  }
  .paper-count {
    font-size: 11px;
    color: #64748b;
    font-weight: 400;
  }
  .paper-icon {
    font-size: 12px;
  }

  /* Scrollbar */
  #panel::-webkit-scrollbar { width: 6px; }
  #panel::-webkit-scrollbar-track { background: transparent; }
  #panel::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

  /* Tooltip */
  #tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(17, 24, 39, 0.95);
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: #e2e8f0;
    max-width: 250px;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    backdrop-filter: blur(8px);
  }
</style>
</head>
<body>
<div id="app">
  <div id="graph-container">
    <svg id="graph"></svg>
    <div id="title-bar">
      <a href="index.html" class="back-link">← ISW Analysis</a>
      <h1>Knowledge Graph</h1>
      <div class="subtitle">Domain: ISW</div>
    </div>
    <div id="controls">
      <button class="ctrl-btn" onclick="resetView()">Reset</button>
      <button class="ctrl-btn" id="btn-labels" onclick="toggleLabels()">Labels</button>
      <button class="ctrl-btn" id="btn-edges" onclick="toggleEdgeLabels()">Edge types</button>
    </div>
    <div id="legend">
      <h4>Card Types</h4>
      <div class="legend-item" data-type="theme" onclick="toggleType('theme', this)"><div class="legend-dot" style="background:#3b82f6"></div> Theme</div>
      <div class="legend-item" data-type="provocation" onclick="toggleType('provocation', this)"><div class="legend-dot" style="background:#a855f7"></div> Provocation</div>
      <div class="legend-item" data-type="finding" onclick="toggleType('finding', this)"><div class="legend-dot" style="background:#22c55e"></div> Finding</div>
      <div class="legend-item" data-type="gap" onclick="toggleType('gap', this)"><div class="legend-dot" style="background:#eab308"></div> Gap</div>
      <div class="legend-item" data-type="method" onclick="toggleType('method', this)"><div class="legend-dot" style="background:#06b6d4"></div> Method</div>
      <div class="legend-item" data-type="weird" onclick="toggleType('weird', this)"><div class="legend-dot" style="background:#f43f5e"></div> Weird Find</div>
      <div class="legend-hint">click to toggle · <a href="#" onclick="resetTypeFilters(event)" style="color:#06B6D4;text-decoration:none">reset</a></div>
      <h4 style="margin-top:10px">Node size = confidence</h4>
    </div>
    <div id="tooltip"></div>
  </div>
  <div id="divider"></div>
  <div id="panel">
    <div id="empty-state">
      <div class="icon">&#x2B2A;</div>
      <p>Click any node to explore a knowledge card.<br>Hover to highlight connections.</p>
    </div>
    <div id="panel-header" style="display:none;"></div>
    <div id="panel-body" style="display:none;"></div>
  </div>
</div>

<script>
// Detect iframe embedding — hide title bar if embedded
if (window.self !== window.top) {
  document.documentElement.setAttribute('data-embedded', '');
}

// ── TAG → KEYWORD MAPPING ────────────────────────────────────────
// Maps knowledge card tags to search keywords for matching against digest papers
const tagKeywords = {
  "memory-systems": ["memory", "rememb", "hippocampus", "consolidation", "forgetting", "episodic", "recall", "retrieval"],
  "agentic-systems": ["agent", "agentic", "middleware", "orchestrat", "multi-agent", "autonomous"],
  "spatio-temporal-memory": ["spatio-temporal", "spatial memory", "temporal", "place cell", "grid cell"],
  "agent-architecture": ["agent", "architecture", "pipeline", "framework", "system design"],
  "embodied-ai": ["embodied", "robot", "manipulation", "locomotion", "navigation", "physical"],
  "intent-to-action": ["intent", "action", "grounding", "affordance", "planning", "policy"],
  "world-models": ["world model", "simulation", "digital twin", "scene", "3d", "gaussian", "nerf", "radiance"],
  "spatial-understanding": ["spatial", "3d", "scene graph", "point cloud", "occupancy", "mapping", "slam"],
  "vision-language": ["vision-language", "vlm", "vla", "clip", "caption", "visual question", "multimodal"],
  "foundation-models": ["foundation model", "llm", "large language", "transformer", "pretrain", "fine-tun"],
  "deep-learning": ["neural", "deep learning", "training", "gradient", "optimization", "network"],
  "scene-modeling": ["scene", "indoor", "room", "building", "floor plan", "layout"],
  "reinforcement-learning": ["reinforcement", "reward", "policy", "rl", "successor representation"],
  "cognitive-maps": ["cognitive map", "place cell", "grid cell", "hippocampal", "spatial code"],
  "complementary-learning-systems": ["complementary learning", "cls", "fast learning", "slow learning", "consolidation"],
  "multimodal": ["multimodal", "cross-modal", "vision-language", "audio", "sensor fusion"],
  "simulation": ["simulation", "simulator", "physics", "isaac", "habitat", "genesis"],
  "robot-learning": ["robot learning", "imitation", "demonstration", "teleoperation", "dexterous"],
  "slam": ["slam", "mapping", "localization", "odometry", "pose estimation"],
  "transformers": ["transformer", "attention", "self-attention", "encoder", "decoder"]
};

// ── DIGEST PAPERS DATA ───────────────────────────────────────────
// (loaded inline from digest collection)

const digestPapers = [{"d": "2026-04-23", "t": "An Ontology for Unified Modeling of Tasks, Actions, Environments, and Capabilities in Personal Service Robotics", "s": "Unifies action models, task representations, and environment ontologies into a single formal framework for robot reasoning. Exactly the semantic backbone needed for compositional task planning.", "c": "planning-formalisms", "u": "https://arxiv.org/abs/2509.22434", "i": "\ud83d\udd25"}, {"d": "2026-04-23", "t": "Robot Planning via LLM Proposals and Symbolic Verification", "s": "Combines LLM plan generation with formal symbolic verification\u2014catching errors before execution. The closed-loop validation pattern the pipeline needs for safety and reliability.", "c": "intent-to-action", "u": "https://www.mdpi.com/2504-4990/8/1/22", "i": "\ud83d\udd25"}, {"d": "2026-04-23", "t": "3D-Grounded Vision-Language Framework for Robotic Task Planning: Automated Prompt Synthesis and Supervised Reasoning", "s": "Embeds 3D spatial information into VLM prompts to ground abstract instructions in physical reality. Bridges the gap between language intent and spatially-aware action planning.", "c": "vision-language", "u": "https://arxiv.org/abs/2502.08903", "i": "\ud83d\udd25"}, {"d": "2026-04-23", "t": "Latent learning: episodic memory complements parametric learning by enabling flexible reuse of experiences", "s": "Shows episodic memory enables flexible reuse of past experiences without parametric retraining\u2014exactly the cognitive mechanism for plan library composition and experience-based adaptation.", "c": "planning-cognition", "u": "https://arxiv.org/abs/2509.16189", "i": "\ud83d\udd25"}, {"d": "2026-04-23", "t": "Large language model-based task planning for service robots: A review", "s": "Comprehensive review of LLM-driven task decomposition for service robots. Taxonomizes the entire field from NL instruction parsing to action sequence generation.", "c": "intent-to-action", "u": "https://www.sciencedirect.com/science/article/pii/S2667379726000021", "i": "\ud83c\udf00"}, {"d": "2026-04-23", "t": "Grounding Large Language Models for Robot Task Planning Using Closed-Loop State Feedback", "s": "Integrates environmental feedback into LLM planning loop for robust replanning and execution error recovery. The closed-loop pattern that makes high-level planning work in the real world.", "c": "intent-to-action", "u": "https://advanced.onlinelibrary.wiley.com/doi/10.1002/adrr.202500072", "i": "\ud83c\udf00"}, {"d": "2026-04-23", "t": "Digital twins to embodied artificial intelligence: review and perspective", "s": "Frames digital twins as data generation infrastructure for embodied AI training and evaluation. The simulation-reality bridge for safe policy development.", "c": "indoor-world-model", "u": "https://www.oaepublish.com/articles/ir.2025.11", "i": "\ud83c\udf00"}, {"d": "2026-04-23", "t": "Digital Twins Transition to Intelligent, AI-Driven Systems in 2026", "s": "Industry perspective on edge AI + digital twin coupling for millisecond-level autonomy. Real-time closed-loop control is moving from lab to production.", "c": "indoor-world-model", "u": "https://www.rtinsights.com/digital-twins-in-2026-from-digital-replicas-to-intelligent-ai-driven-systems/", "i": "\ud83d\udcce"}, {"d": "2026-04-23", "t": "RoboGen: Towards Unleashing Infinite Data for Automated Robot Learning via Generative Simulation", "s": "Self-guided agent autonomously proposes tasks, generates simulation environments, and learns policies\u2014the generative simulation loop for scalable robot training without human annotation.", "c": "robot-learning", "u": "https://arxiv.org/abs/2311.01455", "i": "\ud83c\udf00"}, {"d": "2026-04-23", "t": "Generative Simulation for Policy Learning in Physical Human-Robot Interaction", "s": "Extends generative simulation to physical HRI\u2014automatically synthesizing contact-rich interaction scenarios for collaborative robot policy training. The next frontier beyond solo manipulation.", "c": "robot-learning", "u": "https://arxiv.org/abs/2604.08664", "i": "\ud83c\udf00"}, {"d": "2026-04-22", "t": "Spatially Grounded Long-Horizon Task Planning in the Wild", "s": "Introduces GroundedPlanBench: jointly evaluates hierarchical sub-action planning AND spatial grounding under both explicit and implicit instructions. This directly addresses the intent-to-action pipel", "c": "intent-to-action", "u": "https://arxiv.org/abs/2603.13433", "i": "\ud83d\udd25"}, {"d": "2026-04-22", "t": "EmboTeam: Grounding LLM Reasoning into Reactive Behavior Trees via PDDL for Embodied Multi-Robot Collaboration", "s": "Deep integration of LLM semantic reasoning, formal PDDL planning, and reactive behavior trees for multi-robot coordination. Acts as the high-level cognitive planner within a broader hierarchical embod", "c": "planning-formalisms", "u": "https://arxiv.org/abs/2601.11063", "i": "\ud83d\udd25"}, {"d": "2026-04-22", "t": "Agent-Based Control of Robot Behavior Using Reasoning Language Models", "s": "Proposes a reasoned control system that interprets vague human goal-setting instructions and shapes robot behavior using external environment information and operator feedback. This is agentic middlew", "c": "agentic-robot-middleware", "u": "https://link.springer.com/article/10.1134/S0005117925601101", "i": "\ud83d\udd25"}, {"d": "2026-04-22", "t": "Robotic World Model: A Neural Network Simulator for Robust Policy Optimization in Robotics", "s": "Dual-autoregressive mechanism enables reliable long-horizon predictions without domain-specific biases. Zero-shot transfer to ANYmal D hardware with minimal sim-to-real loss. Advances model-based RL b", "c": "robot-learning", "u": "https://arxiv.org/abs/2501.10100", "i": "\ud83d\udd25"}, {"d": "2026-04-22", "t": "SpatialBench: Benchmarking Multimodal Large Language Models for Spatial Cognition", "s": "Comprehensive spatial reasoning benchmark for MLLMs. Current VLMs struggle with spatial tasks (50-60% accuracy)\u2014this ben ications", "s": "First benchmark for evaluating *memory* in agent applications over long horizons. Introduces hybrid tool-augmented retrieval. Essential infrastructure for agentic world-model agents that need persiste", "c": "agentic-systems", "u": "https://arxiv.org/abs/2602.22769", "i": "\ud83c\udf00"}, {"d": "2026-03-08", "t": "Anatomy of Agentic Memory: Taxonomy and Empirical Analysis of Evaluation and System Limitations", "s": "Comprehensive taxonomy of memory architectures for agents, including stability gaps when using open vs. closed models. Reveals structural limits in current memory systems.", "c": "agentic-systems", "u": "https://arxiv.org/html/2602.19320v1", "i": "\ud83c\udf00"}, {"d": "2026-03-08", "t": "RoboSpatial: Teaching Spatial Understanding to 2D and 3D Vision-Language Models for Robotics", "s": "Explicitly teaches VLMs spatial grounding for robot manipulation. Addresses a known gap: VLMs excel at semantics but fail at 3D spatial reasoning needed for physical tasks.", "c": "vision-language", "u": "https://arxiv.org/html/2411.16537", "i": "\ud83c\udf00"}, {"d": "2026-03-08", "t": "Language and Geometry Grounded Sparse Voxel Representations for Holistic Scene Understanding", "s": "Unified framework for modeling appearance, semantics, *and geometry* in 3D scenes. Sparse voxel approach scales better than dense methods. Bridges gap between language and geometric scene representati", "c": "spatial-understanding", "u": "https://arxiv.org/abs/2602.15734", "i": "\ud83c\udf00"}, {"d": "2026-03-08", "t": "COMBAT: Conditional World Models for Behavioral Agent Training", "s": "1.2B parameter Diffusion Transformer trained with causal distillation + diffusion forcing for real-time inference. Uses deep compression autoencoder to enable conditional world modeling at scale.", "c": "robot-learning", "u": "https://arxiv.org/html/2603.00825", "i": "\ud83c\udf00"}, {"d": "2026-03-07", "t": "\ud83d\udd25 DreamDojo: A Generalist Robot World Model from Video", "s": "Hand // ── COLOR/SIZE MAPS ──────────────────────────────────────────────

const typeColors = {
  theme: "#3b82f6",
  provocation: "#a855f7",
  finding: "#22c55e",
  gap: "#eab308",
  method: "#06b6d4",
  weird: "#f43f5e"
};

const typeBadgeClass = {
  theme: "badge-theme",
  provocation: "badge-provocation",
  finding: "badge-finding",
  gap: "badge-gap",
  method: "badge-method",
  weird: "badge-weird"
};

const connectionColors = {
  supports: "#4ade80",
  contradicts: "#f87171",
  extends: "#60a5fa",
  parallels: "#fbbf24",
  requires: "#c084fc",
  "gap-for": "#fb923c"
};

function nodeRadius(d) { return 8 + d.confidence * 3; }

// ── BUILD GRAPH ──────────────────────────────────────────────────

const cardMap = new Map(cards.map(c => [c.id, c]));
const width = document.getElementById('graph-container').clientWidth;
const height = document.getElementById('graph-container').clientHeight;

const svg = d3.select("#graph")
  .attr("viewBox", [0, 0, width, height]);

// Arrow markers for each connection type
const defs = svg.append("defs");
Object.entries(connectionColors).forEach(([type, color]) => {
  defs.append("marker")
    .attr("id", `arrow-${type}`)
    .attr("viewBox", "0 -5 10 10")
    .attr("refX", 20)
    .attr("refY", 0)
    .attr("markerWidth", 6)
    .attr("markerHeight", 6)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M0,-4L10,0L0,4")
    .attr("fill", color);
});

// Glow filter
const filter = defs.append("filter").attr("id", "glow");
filter.append("feGaussianBlur").attr("stdDeviation", "3").attr("result", "blur");
filter.append("feMerge").selectAll("feMergeNode")
  .data(["blur", "SourceGraphic"]).enter()
  .append("feMergeNode").attr("in", d => d);

const g = svg.append("g");

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.3, 4])
  .on("zoom", (event) => g.attr("transform", event.transform));
svg.call(zoom);

// Force simulation
const simulation = d3.forceSimulation(cards)
  .force("link", d3.forceLink(connections).id(d => d.id).distance(140).strength(0.4))
  .force("charge", d3.forceManyBody().strength(-600))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collision", d3.forceCollide().radius(d => nodeRadius(d) + 20))
  .force("x", d3.forceX(width / 2).strength(0.04))
  .force("y", d3.forceY(height / 2).strength(0.04));

// Links
const linkGroup = g.append("g").attr("class", "links");
const link = linkGroup.selectAll("line")
  .data(connections)
  .join("line")
  .attr("class", "link")
  .attr("stroke", d => connectionColors[d.type] || "#445566")
  .attr("marker-end", d => `url(#arrow-${d.type})`);

// Edge labels
const edgeLabelGroup = g.append("g").attr("class", "edge-labels");
const edgeLabel = edgeLabelGroup.selectAll("text")
  .data(connections)
  .join("text")
  .attr("class", "edge-label")
  .text(d => d.type)
  .style("display", "none");

// Nodes
const node = g.append("g").attr("class", "nodes")
  .selectAll("g")
  .data(cards)
  .join("g")
  .attr("class", "node")
  .call(d3.drag()
    .on("start", dragstarted)
    .on("drag", dragged)
    .on("end", dragended));

node.append("circle")
  .attr("r", d => nodeRadius(d))
  .attr("fill", d => typeColors[d.type] || "#666")
  .attr("stroke", d => d3.color(typeColors[d.type] || "#666").brighter(0.6))
  .attr("filter", "url(#glow)");

// Labels
const labels = node.append("text")
  .attr("dy", d => nodeRadius(d) + 14)
  .text(d => d.title.length > 30 ? d.title.slice(0, 28) + '…' : d.title)
  .style("font-size", "10px");

// Tooltip
const tooltip = document.getElementById("tooltip");

node.on("mouseover", function(event, d) {
  if (selectedNode && selectedNode.id === d.id) return;
  highlightConnections(d);
  tooltip.style.opacity = 1;
  tooltip.innerHTML = `<strong>${d.title}</strong><br><span style="color:${typeColors[d.type]}">${d.type}</span> · confidence ${d.confidence}/5`;
  tooltip.style.left = (event.pageX + 15) + "px";
  tooltip.style.top = (event.pageY - 10) + "px";
})
.on("mousemove", (event) => {
  tooltip.style.left = (event.pageX + 15) + "px";
  tooltip.style.top = (event.pageY - 10) + "px";
})
.on("mouseout", function(event, d) {
  if (!selectedNode) {
    clearHighlight();
  } else {
    highlightConnections(selectedNode);
  }
  tooltip.style.opacity = 0;
})
.on("click", function(event, d) {
  event.stopPropagation();
  selectNode(d);
});

svg.on("click", () => {
  deselectNode();
});

// Tick
simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);

  edgeLabel
    .attr("x", d => (d.source.x + d.target.x) / 2)
    .attr("y", d => (d.source.y + d.target.y) / 2 - 6);

  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

// ── INTERACTION ──────────────────────────────────────────────────

var selectedNode = null;
var showLabels = true;
var showEdgeLabels = false;

function getConnectedNodes(d) {
  const connected = new Set();
  const connectedLinks = [];
  connections.forEach(c => {
    const src = typeof c.source === 'object' ? c.source.id : c.source;
    const tgt = typeof c.target === 'object' ? c.target.id : c.target;
    if (src === d.id) { connected.add(tgt); connectedLinks.push(c); }
    if (tgt === d.id) { connected.add(src); connectedLinks.push(c); }
  });
  connected.add(d.id);
  return { connected, connectedLinks };
}

function highlightConnections(d) {
  const { connected, connectedLinks } = getConnectedNodes(d);

  node.classed("highlighted", n => connected.has(n.id))
      .classed("dimmed", n => !connected.has(n.id));

  link.classed("highlighted", l => connectedLinks.includes(l))
      .classed("dimmed", l => !connectedLinks.includes(l));
}

function clearHighlight() {
  node.classed("highlighted", false).classed("dimmed", false);
  link.classed("highlighted", false).classed("dimmed", false);
}

function selectNode(d) {
  selectedNode = d;
  highlightConnections(d);

  // Pulse the selected node
  node.select("circle")
    .attr("stroke-width", n => n.id === d.id ? 4 : 2);

  showPanel(d);
}

function deselectNode() {
  selectedNode = null;
  clearHighlight();
  node.select("circle").attr("stroke-width", 2);
  hidePanel();
}

function showPanel(d) {
  document.getElementById("empty-state").style.display = "none";
  const header = document.getElementById("panel-header");
  const body = document.getElementById("panel-body");
  header.style.display = "block";
  body.style.display = "block";

  // Header
  const typeLabel = d.type === 'weird' ? 'Weird Find' : d.type;
  let confDots = '';
  for (let i = 1; i <= 5; i++) {
    confDots += `<div class="confidence-dot ${i <= d.confidence ? 'filled' : ''}"></div>`;
  }

  header.innerHTML = `
    <h2>${d.title}</h2>
    <div class="card-meta">
      <span class="badge ${typeBadgeClass[d.type]}">${typeLabel}</span>
      <span class="badge badge-domain">${d.domain}</span>
      <span class="confidence-dots" title="Confidence ${d.confidence}/5">${confDots}</span>
    </div>
  `;

  // Body
  let html = `<h3>Summary</h3><p>${d.summary}</p>`;

  if (d.evidence && d.evidence.length) {
    html += `<h3>Evidence</h3><ul>${d.evidence.map(e => `<li>${e}</li>`).join('')}</ul>`;
  }

  html += `<h3>Significance</h3><p>${d.significance}</p>`;

  if (d.openQuestions && d.openQuestions.length) {
    html += `<h3>Open Questions</h3><ul>${d.openQuestions.map(q => `<li>${q}</li>`).join('')}</ul>`;
  }

  // Connections
  const cardConns = [];
  connections.forEach(c => {
    const src = typeof c.source === 'object' ? c.source.id : c.source;
    const tgt = typeof c.target === 'object' ? c.target.id : c.target;
    if (src === d.id) {
      cardConns.push({ target: tgt, type: c.type, direction: "→", note: c.note });
    } else if (tgt === d.id) {
      cardConns.push({ target: src, type: c.type, direction: "←", note: c.note });
    }
  });

  if (cardConns.length) {
    html += `<h3>Connections (${cardConns.length})</h3><ul class="connection-list">`;
    cardConns.forEach(c => {
      const card = cardMap.get(c.target);
      const name = card ? card.title : c.target;
      html += `
        <li onclick="navigateTo('${c.target}')">
          <span class="conn-type conn-type-${c.type}">${c.type}</span>
          <span class="conn-name">${name}</span>
          <span class="conn-direction">${c.direction}</span>
        </li>`;
      if (c.note) {
        html += `<div class="conn-note">${c.note}</div>`;
      }
    });
    html += `</ul>`;
  }

  // Tags (clickable)
  if (d.tags && d.tags.length) {
    html += `<h3>Tags</h3><div class="tag-list">${d.tags.map(t => `<span class="tag" onclick="event.stopPropagation(); filterByTag('${t}', this)">${t}</span>`).join('')}</div>`;
    html += `<div id="papers-container"></div>`;
  }

  body.innerHTML = html;
}

function hidePanel() {
  document.getElementById("empty-state").style.display = "flex";
  document.getElementById("panel-header").style.display = "none";
  document.getElementById("panel-body").style.display = "none";
}

function navigateTo(id) {
  const card = cards.find(c => c.id === id);
  if (card) {
    selectNode(card);
    // Center the view on this node
    const transform = d3.zoomTransform(svg.node());
    const x = width / 2 - card.x * transform.k;
    const y = height / 2 - card.y * transform.k;
    svg.transition().duration(600)
      .call(zoom.transform, d3.zoomIdentity.translate(x, y).scale(transform.k));
  }
}

function resetView() {
  deselectNode();
  svg.transition().duration(600)
    .call(zoom.transform, d3.zoomIdentity);
  simulation.alpha(0.3).restart();
}

function toggleLabels() {
  showLabels = !showLabels;
  applyVisibility();
  document.getElementById("btn-labels").classList.toggle("active", showLabels);
}

function toggleEdgeLabels() {
  showEdgeLabels = !showEdgeLabels;
  applyVisibility();
  document.getElementById("btn-edges").classList.toggle("active", showEdgeLabels);
}

// ── TYPE FILTER TOGGLES ──────────────────────────────────────────
// activeTypes is the set of card types currently visible. Clicking a
// legend item toggles that type on/off. An edge is hidden if either
// of its endpoint types is hidden. applyVisibility() is the single
// source of truth for display state — it folds in type filter,
// node-label toggle, and edge-label toggle.

const activeTypes = new Set(Object.keys(typeColors));

function isTypeVisible(t) { return activeTypes.has(t); }

function edgeEndpointType(endpoint) {
  return typeof endpoint === 'object' ? endpoint.type : cardMap.get(endpoint)?.type;
}

function applyVisibility() {
  // Nodes: hidden if their type is filtered off
  node.style("display", d => isTypeVisible(d.type) ? null : "none");

  // Node labels: hidden unless showLabels AND node visible
  labels.style("display", d => (showLabels && isTypeVisible(d.type)) ? "block" : "none");

  // Links: hidden if either endpoint type is filtered off
  const edgeShown = l => isTypeVisible(edgeEndpointType(l.source)) && isTypeVisible(edgeEndpointType(l.target));
  link.style("display", l => edgeShown(l) ? null : "none");

  // Edge labels: hidden unless showEdgeLabels AND link visible
  edgeLabel.style("display", l => (showEdgeLabels && edgeShown(l)) ? "block" : "none");

  // If the selected node is now hidden, deselect
  if (selectedNode && !isTypeVisible(selectedNode.type)) {
    deselectNode();
  }
}

function toggleType(type, el) {
  if (activeTypes.has(type)) {
    activeTypes.delete(type);
    el.classList.add('filtered-off');
  } else {
    activeTypes.add(type);
    el.classList.remove('filtered-off');
  }
  applyVisibility();
}

function resetTypeFilters(event) {
  if (event) event.preventDefault();
  Object.keys(typeColors).forEach(t => activeTypes.add(t));
  document.querySelectorAll('.legend-item[data-type]').forEach(el => {
    el.classList.remove('filtered-off');
  });
  applyVisibility();
}

// ── TAG → PAPER FILTERING ────────────────────────────────────────

var activeTag = null;

function filterByTag(tag, el) {
  const container = document.getElementById('papers-container');
  if (!container) return;

  // Toggle off if same tag clicked again
  if (activeTag === tag) {
    activeTag = null;
    container.innerHTML = '';
    document.querySelectorAll('.tag.active').forEach(t => t.classList.remove('active'));
    return;
  }

  activeTag = tag;
  // Update active state on tags
  document.querySelectorAll('.tag.active').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');

  // Get keywords for this tag
  const keywords = tagKeywords[tag] || [tag.replace(/-/g, ' ')];

  // Search papers
  const matches = [];
  if (typeof digestPapers !== 'undefined') {
    digestPapers.forEach(p => {
      const text = (p.t + ' ' + p.s + ' ' + p.c).toLowerCase();
      const score = keywords.reduce((acc, kw) => {
        const kwl = kw.toLowerCase();
        // Title match worth more
        const titleHit = p.t.toLowerCase().includes(kwl) ? 3 : 0;
        const summaryHit = p.s.toLowerCase().includes(kwl) ? 2 : 0;
        const clusterHit = p.c.toLowerCase().includes(kwl) ? 1 : 0;
        return acc + titleHit + summaryHit + clusterHit;
      }, 0);
      if (score > 0) {
        matches.push({ ...p, score });
      }
    });
  }

  // Sort by score descending, then date descending
  matches.sort((a, b) => b.score - a.score || b.d.localeCompare(a.d));

  // Render
  let html = `<div class="papers-section">`;
  html += `<div class="papers-header">`;
  html += `<h3>Research Papers <span class="paper-count">(${matches.length} matching "${tag}")</span></h3>`;
  html += `<button class="papers-close" onclick="clearPapers()">Close</button>`;
  html += `</div>`;

  if (matches.length === 0) {
    html += `<p style="font-size:12px;color:#64748b;padding:8px 0;">No matching papers found in the digest collection for this tag.</p>`;
  } else {
    const shown = matches.slice(0, 25);
    shown.forEach(p => {
      const clusterLabel = p.c ? `<span class="paper-cluster">${p.c}</span>` : '';
      const icon = p.i ? `<span class="paper-icon">${p.i}</span> ` : '';
      const url = p.u ? `href="${p.u}" target="_blank" rel="noopener"` : '';
      html += `<div class="paper-card">`;
      html += `<a ${url}><div class="paper-title">${icon}${p.t}</div></a>`;
      html += `<div class="paper-meta"><span>${p.d}</span>${clusterLabel}</div>`;
      if (p.s) {
        html += `<div class="paper-summary">${p.s}</div>`;
      }
      html += `</div>`;
    });
    if (matches.length > 25) {
      html += `<p style="font-size:11px;color:#64748b;padding:8px 0;">Showing 25 of ${matches.length} matches.</p>`;
    }
  }
  html += `</div>`;
  container.innerHTML = html;

  // Scroll panel to show papers
  const panel = document.getElementById('panel');
  setTimeout(() => {
    container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

function clearPapers() {
  activeTag = null;
  const container = document.getElementById('papers-container');
  if (container) container.innerHTML = '';
  document.querySelectorAll('.tag.active').forEach(t => t.classList.remove('active'));
}

// ── DRAG ─────────────────────────────────────────────────────────

function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) {
  d.fx = event.x; d.fy = event.y;
}
function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ── DRAGGABLE DIVIDER ───────────────────────────────────────────

let isResizing = false;
let startX = 0;
let startGraphWidth = 0;

const divider = document.getElementById('divider');
const app = document.getElementById('app');
const graphContainer = document.getElementById('graph-container');
const panel = document.getElementById('panel');

divider.addEventListener('mousedown', (e) => {
  isResizing = true;
  startX = e.clientX;
  startGraphWidth = graphContainer.offsetWidth;
  document.body.style.userSelect = 'none';
  document.body.style.cursor = 'col-resize';
});

document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;

  const delta = e.clientX - startX;
  const newGraphWidth = startGraphWidth + delta;
  const newPanelWidth = app.offsetWidth - newGraphWidth - 4; // 4px is divider width

  // Min widths: graph 400px, panel 300px
  if (newGraphWidth >= 400 && newPanelWidth >= 300) {
    graphContainer.style.flex = '0 0 ' + newGraphWidth + 'px';
    panel.style.width = newPanelWidth + 'px';
  }
});

document.addEventListener('mouseup', () => {
  isResizing = false;
  document.body.style.userSelect = 'auto';
  document.body.style.cursor = 'auto';
});

// Initial state
document.getElementById("btn-labels").classList.add("active");
</script>
</body>
</html>
